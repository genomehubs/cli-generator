# Runtime Swagger UI customisation for GoaT (Genomes on a Tree).
#
# Reference this file from es_integration.toml:
#
#   swagger_examples = "config/swagger-examples-goat.yaml"
#
# The API loads it at startup and applies the overrides to the compiled OpenAPI
# spec.  Restart the API after editing this file.
#
# Two sections are supported:
#
#   info     — overrides the OpenAPI info block (title, description, contact).
#   examples — request-body examples for POST endpoints shown in Swagger UI.
#              Examples listed here REPLACE any compile-time examples for that
#              path + method pair.  Paths not mentioned keep their defaults.

# ── API info block ────────────────────────────────────────────────────────────

info:
  title: "GoaT API"
  description: |
    **Genomes on a Tree** Application Programming Interface (GoaT API).

    Provides a low-level API to retrieve records, look up taxa, search and
    generate reports across all taxon and assembly data in GoaT.

    See the [GoaT documentation](https://goat.genomehubs.org) for further
    details, or use the SDK for Python, R and JavaScript to build queries
    programmatically.
  contact:
    name: "GoaT"
    url: "https://goat.genomehubs.org"
    email: "goat@genomehubs.org"
  license:
    name: "MIT License"
    url: "https://github.com/genomehubs/genomehubs/blob/main/LICENSE"

# ── Request-body examples ─────────────────────────────────────────────────────
#
# Each entry:
#   path    — API path (e.g. /api/v3/count)
#   method  — HTTP method in lowercase (post, get, …)
#   name    — key in the OpenAPI examples map (no spaces)
#   summary — one-line label shown in the Swagger UI dropdown
#   value   — the example request body as a JSON/YAML object
#
# POST body shape:
#   query:
#     index: taxon | assembly | sample | feature
#     taxa: ["taxon_name", ...]  ← optional taxon filter
#     taxon_filter_type: tree|name|lineage|...
#     fields: ["field_name", ...]  ← short form (normalised)
#     attributes: [{name: "...", operator: "...", value: ...}]
#     rank: species  ← restrict to rank
#   params:
#     size: 10
#     taxonomy: ncbi
#     include_estimates: true
#     sort_by: field_name
#     sort_order: asc | desc
#     tidy: true
#
# record/batch body shape:
#   record_ids: ["taxon-9606", ...]
#   result: taxon | assembly | sample
#
# summary/batch body shape:
#   queries:
#     - record_id: "9606"
#       result: taxon
#       fields: ["genome_size"]

examples:
  # ── POST /api/v3/count ─────────────────────────────────────────────────────

  - path: "/api/v3/count"
    method: post
    name: mammalia_species_count
    summary: "Count Mammalia taxa with a genome size estimate"
    value:
      query:
        index: taxon
        taxa: ["Mammalia"]
        taxon_filter_type: tree
        fields: ["genome_size"]
      params:
        size: 0
        include_estimates: true
        taxonomy: ncbi

  - path: "/api/v3/count"
    method: post
    name: insecta_species_count
    summary: "Count the number of insect species"
    value:
      query:
        index: taxon
        rank: species
        taxa:
          - Insecta
        taxon_filter_type: tree
      params:
        size: 0
        taxonomy: ncbi

  - path: "/api/v3/count"
    method: post
    name: vertebrate_c_value_count
    summary: "Count vertebrate genera with a C-value estimate"
    value:
      query:
        index: taxon
        rank: genus
        taxa: ["Vertebrata"]
        taxon_filter_type: tree
        fields: ["c_value"]
      params:
        size: 0
        include_estimates: true
        taxonomy: ncbi

  # ── POST /api/v3/search ────────────────────────────────────────────────────

  - path: "/api/v3/search"
    method: post
    name: mammalia_genome_size
    summary: "Search Mammal species with genome size, sorted descending"
    value:
      query:
        index: taxon
        taxa: ["Mammalia"]
        taxon_filter_type: tree
        fields: ["genome_size"]
        rank: species
        excludeAncestral: ["genome_size"]
      params:
        size: 10
        sort_by: genome_size
        sort_order: desc
        include_estimates: true
        taxonomy: ncbi

  - path: "/api/v3/search"
    method: post
    name: large_mammal_assemblies
    summary: "Search assemblies for mammals with genome ≥ 1 Gbp"
    value:
      query:
        index: assembly
        taxa: ["Mammalia"]
        taxon_filter_type: tree
        fields: ["assembly_span", "assembly_level", "scientific_name"]
        attributes:
          - name: assembly_span
            operator: gte
            value: "1000000000"
      params:
        size: 10
        taxonomy: ncbi

  - path: "/api/v3/search"
    method: post
    name: vertebrate_c_value
    summary: "Search vertebrates with C-value data"
    value:
      query:
        index: taxon
        taxa: ["Vertebrata"]
        taxon_filter_type: tree
        fields: ["c_value", "genome_size", "scientific_name"]
        rank: species
      params:
        size: 10
        include_estimates: true
        taxonomy: ncbi

  # ── POST /api/v3/search/batch ──────────────────────────────────────────────

  - path: "/api/v3/search/batch"
    method: post
    name: mammalia_and_insecta_parallel
    summary: "Search Mammalia and Insecta taxa in parallel"
    value:
      searches:
        - query:
            index: taxon
            taxa: ["Mammalia"]
            taxon_filter_type: tree
            fields: ["genome_size", "scientific_name"]
            rank: species
          params:
            size: 5
            taxonomy: ncbi
        - query:
            index: taxon
            taxa: ["Insecta"]
            taxon_filter_type: tree
            fields: ["genome_size", "scientific_name"]
            rank: species
          params:
            size: 5
            taxonomy: ncbi

  # ── POST /api/v3/count/batch ───────────────────────────────────────────────

  - path: "/api/v3/count/batch"
    method: post
    name: vertebrate_and_invertebrate_counts
    summary: "Count vertebrates and invertebrates in parallel"
    value:
      searches:
        - query:
            index: taxon
            taxa: ["Vertebrata"]
            taxon_filter_type: tree
          params:
            size: 0
            taxonomy: ncbi
        - query:
            index: taxon
            taxa: ["Insecta"]
            taxon_filter_type: tree
          params:
            size: 0
            taxonomy: ncbi

  # ── POST /api/v3/record/batch ──────────────────────────────────────────────

  - path: "/api/v3/record/batch"
    method: post
    name: taxon_records_by_id
    summary: "Fetch taxon records for human and fruit fly"
    value:
      record_ids: ["taxon-9606", "taxon-7227"]
      result: taxon

  - path: "/api/v3/record/batch"
    method: post
    name: assembly_records_by_id
    summary: "Fetch assembly records by ID"
    value:
      record_ids: ["assembly-GCA_000001405.29", "assembly-GCA_000001215.4"]
      result: assembly

  # ── POST /api/v3/summary/batch ─────────────────────────────────────────────

  - path: "/api/v3/summary/batch"
    method: post
    name: two_taxa_genome_size
    summary: "Fetch genome_size summary for human and fruit fly"
    value:
      queries:
        - record_id: "9606"
          result: taxon
          fields: ["genome_size", "c_value"]
        - record_id: "7227"
          result: taxon
          fields: ["genome_size"]

  # ── POST /api/v3/report/batch ─────────────────────────────────────────────

  - path: "/api/v3/report/batch"
    method: post
    name: chordata_and_nematoda_report_batch
    summary: "Run arc reports for Chordata and Nematoda in parallel"
    value:
      concurrency: 2
      reports:
        - query:
            taxa: ["Chordata"]
            taxon_filter_type: tree
            rank: species
          report:
            report: arc
            feature: "bioproject=prjna533106"
            reference: assembly_level
            context: ""
        - query:
            taxa: ["Nematoda"]
            taxon_filter_type: tree
            rank: species
          report:
            report: arc
            feature: "bioproject=prjna533106"
            reference: assembly_level
            context: ""
