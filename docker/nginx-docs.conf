server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the rendered Quarto site at /docs/
    location /docs/ {
        try_files $uri $uri/ $uri.html =404;
    }

    # Redirect bare /docs (no trailing slash) to /docs/
    location = /docs {
        return 301 /docs/;
    }

    # Redirect root to /docs/
    location = / {
        return 301 /docs/;
    }

    error_page 404 /docs/404.html;
}
