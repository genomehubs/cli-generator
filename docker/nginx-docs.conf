server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Prevent MIME-type sniffing.
    add_header X-Content-Type-Options   "nosniff"            always;
    # Prevent click-jacking by disallowing the page to be framed from other origins.
    add_header X-Frame-Options          "SAMEORIGIN"         always;
    # Enforce the browser's XSS filter.
    add_header X-XSS-Protection         "1; mode=block"      always;
    # Do not send the referrer to external sites.
    add_header Referrer-Policy          "strict-origin"      always;
    # Cache static assets for 1 day; HTML never (always revalidated).
    # Per-location overrides below handle more specific caching.

    # Remove the server version banner.
    server_tokens off;

    # ── /docs/ — rendered Quarto site ────────────────────────────────────────
    location /docs/ {
        try_files $uri $uri/ $uri.html =404;

        # HTML pages must not be cached (Quarto may update them).
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
        }
        # Static assets (CSS, JS, fonts, images) can be cached aggressively.
        location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            add_header Cache-Control "public, max-age=86400, immutable" always;
        }
    }

    # Redirect bare /docs (no trailing slash) to /docs/
    location = /docs {
        return 301 /docs/;
    }

    # Redirect root to /docs/
    location = / {
        return 301 /docs/;
    }

    error_page 404 /docs/404.html;
}
