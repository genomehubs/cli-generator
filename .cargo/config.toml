# macOS — dynamic lookup linker flags required when building cdylib outside maturin.
#
# Without these, `cargo build` (not via maturin) fails with "undefined symbols"
# for the PyO3 Python API symbols when crate-type includes cdylib.
# Maturin handles this automatically; these flags cover manual/IDE builds on macOS.
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# Running `cargo test` directly on macOS requires the Python dylib to be on the
# dynamic linker path.  Set DYLD_LIBRARY_PATH to the lib directory of the active
# Python environment before running tests, for example:
#
#   DYLD_LIBRARY_PATH="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')" \
#     cargo test
#
# maturin develop + pytest does not need this workaround.
