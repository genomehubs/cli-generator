name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-and-upload:
    name: Build and upload binaries
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          BINARY="target/${{ matrix.target }}/release/cli-generator"
          TARBALL="cli-generator-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz"
          tar czf "$TARBALL" "$BINARY"
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV
          echo "BINARY_PATH=$BINARY" >> $GITHUB_ENV

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.TARBALL }}
          asset_name: ${{ env.TARBALL }}
          asset_content_type: application/gzip

  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true  # Allow failure if already published

  # ── Docker: build and push docs images ────────────────────────────────────
  build-and-push-docs-docker:
    name: Release docs image (${{ matrix.site }})
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        site: [goat, boat]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docs image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.docs
          build-args: |
            SITE=${{ matrix.site }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.site }}-docs:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.site }}-docs:latest
          cache-from: type=gha,scope=docs-${{ matrix.site }}
          cache-to: type=gha,mode=max,scope=docs-${{ matrix.site }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

