name: CI

# This workflow is designed for generated projects.
# It will not pass on the uninstantiated template repo itself (template
# variables like {{project-name}} in Cargo.toml are not valid identifiers),
# which is expected — see README.md for details.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Rust: format, lint, and test ─────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # --lib restricts to unit tests in src/. Integration tests in tests/
      # require cargo-generate and are covered by the generated-cli-tests job.
      - name: cargo test
        run: cargo test --lib
        env:
          PROPTEST_CASES: 512

      # Measure Rust code coverage (tarpaulin)
      - name: Install cargo-generate and cargo-tarpaulin
        run: cargo install cargo-generate cargo-tarpaulin

      - name: Measure Rust code coverage
        run: cargo tarpaulin --out Xml --output-dir ./coverage --timeout 300

      # Upload coverage to Codecov (optional; skip if token not available)
      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false
        continue-on-error: true

  # ── Python: format and type-check ────────────────────────────────────────
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatting and type-checking tools
        run: pip install black isort pyright pytest "hypothesis[cli]" pyyaml

      - name: black --check
        run: black --check --line-length 120 python/ tests/python/

      - name: isort --check
        run: isort --check-only --profile black --line-length 120 python/ tests/python/

      # Pyright uses the .pyi stubs in the python package so
      # the compiled Rust extension does not need to be built for this step.
      - name: pyright
        run: pyright python/ tests/python/

  # ── Integration: build the extension and run pytest ──────────────────────
  integration-tests:
    name: Build and test (maturin + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integ-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv .venv && echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install Python test dependencies
        run: pip install maturin pytest "hypothesis[cli]" coverage[toml] pyyaml

      # Builds the extension module in the current venv; no wheel file needed.
      - name: maturin develop
        run: maturin develop --features extension-module

      # CI=1 activates the "ci" Hypothesis profile (derandomize, more examples).
      - name: pytest
        run: pytest tests/python/ -v
        env:
          CI: "1"

      # Measure Python code coverage
      - name: Measure Python code coverage
        run: coverage run -m pytest tests/python/ -v && coverage report --skip-empty

      # Generate Python coverage XML for Codecov
      - name: Generate Python coverage XML
        run: coverage xml

      # Upload coverage to Codecov (optional; skip if token not available)
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: python
          fail_ci_if_error: false
        continue-on-error: true

  # ── Generated CLI: build, test URLs, upload artifact ─────────────────────
  generated-cli-tests:
    name: Generated CLI tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: goat-cli-linux-x86_64
            bin_path: /tmp/generated/goat-cli/target/release/goat-cli
          - os: macos-latest
            artifact-name: goat-cli-macos-aarch64
            bin_path: /tmp/generated/goat-cli/target/release/goat-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-gen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gen-

      - name: Install cargo-generate
        run: cargo install cargo-generate

      # $GITHUB_PATH additions take effect for subsequent steps only, so this
      # must be a separate step from the install above.
      - name: Add ~/.cargo/bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Content-checking tests: generate goat-cli and assert file contents.
      # Fast — no second compile needed.
      # Only run on Linux to avoid duplicating the slow scaffold step.
      - name: cargo test (generated-cli content tests)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --test generated_goat_cli

      # Full build of the generated binary for URL-assertion and artifact.
      - name: Generate goat-cli
        run: cargo run -- new goat --output-dir /tmp/generated --config sites/

      - name: Build goat-cli (release)
        run: cargo build --release
        working-directory: /tmp/generated/goat-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin and pyyaml
        run: pip install maturin pyyaml

      - name: Build Python SDK wheel
        run: |
          echo "MIT License" > LICENSE
          maturin build --release --features extension-module
        working-directory: /tmp/generated/goat-cli

      - name: Upload Python SDK wheel
        uses: actions/upload-artifact@v4
        with:
          name: goat-sdk-wheel-${{ matrix.artifact-name }}
          path: /tmp/generated/goat-cli/target/wheels/*.whl
          retention-days: 14

      - name: Install wasm-pack (for JavaScript SDK)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install wasm-pack

      - name: Build JavaScript SDK WASM
        if: matrix.os == 'ubuntu-latest'
        run: REPO_ROOT=${{ github.workspace }} bash build-wasm.sh
        working-directory: /tmp/generated/goat-cli/js/goat

      - name: Smoke-test Python SDK (URL builder — no network)
        run: |
          pip install /tmp/generated/goat-cli/target/wheels/*.whl pyyaml
          python - <<'EOF'
          from goat_sdk.query import QueryBuilder

          url = QueryBuilder("taxon").set_taxa(["Mammalia"], filter_type="tree").to_url()
          assert "tax_tree" in url, f"Expected tax_tree in URL: {url}"
          assert "result=taxon" in url, f"Expected result=taxon in URL: {url}"

          url2 = (
              QueryBuilder("assembly")
              .set_taxa(["Homo sapiens"])
              .add_field("genome_size")
              .to_url()
          )
          assert "result=assembly" in url2, f"Expected result=assembly: {url2}"

          print("SDK smoke test PASSED")
          print("  taxon URL:", url[:80])
          print("  assembly URL:", url2[:80])
          EOF

      - name: Assert URL outputs
        shell: bash
        run: |
          bin=${{ matrix.bin_path }}

          check() {
            local desc="$1"; shift
            local url
            url=$("$bin" "$@" --url 2>&1)
            echo "$desc: $url"
            echo "$url" | grep -q "$desc" || { echo "FAIL: '$desc' not found in URL"; exit 1; }
          }

          check "busco_completeness"  taxon search --taxon Mammalia --field-groups busco
          check "includeEstimates"    taxon search --taxon Mammalia --field-groups busco
          check "tax_name"            taxon search --taxon Mammalia --field-groups busco
          check "genome_size"         taxon search --taxon Insecta  --field-groups genome-size
          check "habreg_2017"         taxon search --taxon "Homo sapiens" --field-groups legislation
          check "includeEstimates=false" taxon search --taxon Mammalia --field-groups busco --include-estimates=false

      - name: Upload goat-cli binary + SDKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.bin_path }}
            /tmp/generated/goat-cli/PREVIEW.md
            /tmp/generated/goat-cli/js/goat/
          retention-days: 14

  # ── SDK artifacts: JavaScript (WASM + npm) ───────────────────────────────
  # Only run on main branch + manual trigger to keep PR checks fast.
  sdk-artifacts-js:
    name: Build and test JavaScript SDK
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with wasm-pack targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-sdk-js-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-js-

      - name: Install wasm-pack and cargo-generate
        run: cargo install wasm-pack cargo-generate

      - name: Add ~/.cargo/bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate goat-cli SDKs
        run: cargo run -- new goat --output-dir /tmp/generated --config sites/

      - name: Build JavaScript WASM packages
        run: REPO_ROOT=${{ github.workspace }} bash build-wasm.sh
        working-directory: /tmp/generated/goat-cli/js/goat

      - name: Install JavaScript dependencies
        run: npm install
        working-directory: /tmp/generated/goat-cli/js/goat

      - name: Build JavaScript package (npm)
        run: npm run build 2>/dev/null || npm pack
        working-directory: /tmp/generated/goat-cli/js/goat

      - name: Run JavaScript fixture tests
        run: |
          SITE=goat \
          JS_SDK_PATH=/tmp/generated/goat-cli/js/goat/query.js \
          FIXTURES_DIR=$GITHUB_WORKSPACE/tests/python/fixtures-goat \
            node --test tests/javascript/test_sdk_fixtures.mjs

      - name: Upload JavaScript package (npm)
        uses: actions/upload-artifact@v4
        with:
          name: goat-sdk-npm
          path: /tmp/generated/goat-cli/js/goat/*.tgz
          retention-days: 14

  # ── SDK artifacts: R package ──────────────────────────────────────────────
  # R setup takes ~12 mins. Only run on main branch + manual trigger.
  sdk-artifacts-r:
    name: Build and test R SDK
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries must be installed before Set up R and R package installs.
      - name: Install system libraries for R packages
        run: |
          sudo rm -f /var/lib/apt/lists/lock
          sudo dpkg --configure -a
          sudo apt-get -o Apt::Lock::Timeout=300 update
          sudo apt-get -o Apt::Lock::Timeout=300 install -y libcurl4-openssl-dev libssl-dev zlib1g-dev libuv1-dev libfontconfig1-dev libfreetype6-dev pkg-config
        shell: bash
        continue-on-error: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R build dependencies
        run: |
          install.packages(c("devtools", "roxygen2"))
        shell: Rscript {0}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-sdk-r-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-r-

      - name: Install cargo-generate
        run: cargo install cargo-generate

      - name: Add ~/.cargo/bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Generate goat-cli SDKs
        run: cargo run -- new goat --output-dir /tmp/generated --config sites/

      - name: Install R package dependencies
        run: |
          Rscript -e "install.packages(c('httr', 'jsonlite', 'data.table', 'yaml', 'R6'), repos='http://cran.r-project.org')" || exit 1
          Rscript -e "installed.packages()[c('httr', 'jsonlite', 'data.table', 'yaml', 'R6'), c('Package', 'LibPath')]"
        shell: bash

      - name: Build R package
        run: |
          cd /tmp/generated/goat-cli/r/goat
          R CMD build --compact-vignettes=both .
        shell: bash
        env:
          R_LIBS_USER: ~/.R/library

      - name: Check R package
        run: |
          cd /tmp/generated/goat-cli/r/goat
          _R_CHECK_FORCE_SUGGESTS_=false R CMD check *.tar.gz --no-manual --no-build-vignettes || true
        shell: bash
        continue-on-error: true

      - name: Upload R package
        uses: actions/upload-artifact@v4
        with:
          name: goat-sdk-r
          path: /tmp/generated/goat-cli/r/goat/*.tar.gz
          retention-days: 14
