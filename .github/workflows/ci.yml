name: CI

# This workflow is designed for generated projects.
# It will not pass on the uninstantiated template repo itself (template
# variables like {{project-name}} in Cargo.toml are not valid identifiers),
# which is expected — see README.md for details.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Rust: format, lint, and test ─────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # --lib restricts to unit tests in src/. Integration tests in tests/
      # require cargo-generate and are covered by the generated-cli-tests job.
      - name: cargo test
        run: cargo test --lib
        env:
          PROPTEST_CASES: 512

  # ── Python: format and type-check ────────────────────────────────────────
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatting and type-checking tools
        run: pip install black isort pyright pytest "hypothesis[cli]" pyyaml

      - name: black --check
        run: black --check --line-length 120 python/ tests/python/

      - name: isort --check
        run: isort --check-only --profile black --line-length 120 python/ tests/python/

      # Pyright uses the .pyi stubs in the python package so
      # the compiled Rust extension does not need to be built for this step.
      - name: pyright
        run: pyright python/ tests/python/

  # ── Integration: build the extension and run pytest ──────────────────────
  integration-tests:
    name: Build and test (maturin + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integ-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv .venv && echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install Python test dependencies
        run: pip install maturin pytest "hypothesis[cli]" pyyaml

      # Builds the extension module in the current venv; no wheel file needed.
      - name: maturin develop
        run: maturin develop --features extension-module

      # CI=1 activates the "ci" Hypothesis profile (derandomize, more examples).
      - name: pytest
        run: pytest tests/python/ -v
        env:
          CI: "1"

  # ── Generated CLI: build, test URLs, upload artifact ─────────────────────
  generated-cli-tests:
    name: Generated CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-gen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gen-

      - name: Install cargo-generate
        run: cargo install cargo-generate

      # $GITHUB_PATH additions take effect for subsequent steps only, so this
      # must be a separate step from the install above.
      - name: Add ~/.cargo/bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Content-checking tests: generate goat-cli and assert file contents.
      # Fast — no second compile needed.
      - name: cargo test (generated-cli content tests)
        run: cargo test --test generated_goat_cli

      # Full build of the generated binary for URL-assertion and artifact.
      # Use the pre-built binary from the test step rather than cargo run to
      # avoid a recompile where ~/.cargo/bin may not yet be visible to which().
      - name: Generate goat-cli
        run: ./target/debug/cli-generator new goat --output-dir /tmp/generated --config sites/

      - name: Build goat-cli (release)
        run: cargo build --release
        working-directory: /tmp/generated/goat-cli

      - name: Assert URL outputs
        run: |
          bin=/tmp/generated/goat-cli/target/release/goat-cli

          check() {
            local desc="$1"; shift
            local url
            url=$("$bin" "$@" --url 2>&1)
            echo "$desc: $url"
            echo "$url" | grep -q "$desc" || { echo "FAIL: '$desc' not found in URL"; exit 1; }
          }

          check "busco_completeness"  taxon search --taxon Mammalia --busco
          check "includeEstimates"    taxon search --taxon Mammalia --busco
          check "tax_name"            taxon search --taxon Mammalia --busco
          check "genome_size"         taxon search --taxon Insecta --genome-size
          check "habreg_2017"         taxon search --taxon "Homo sapiens" --legislation
          check "includeEstimates=false" taxon search --taxon Mammalia --busco --include-estimates=false

      - name: Upload goat-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: goat-cli-linux-x86_64
          path: /tmp/generated/goat-cli/target/release/goat-cli
          retention-days: 14
