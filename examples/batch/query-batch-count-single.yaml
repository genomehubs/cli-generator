## count/batch with single queries: get counts for multiple queries separately
## Usage:
##   POST /api/v3/count/batch
##   curl -X POST http://localhost:3000/api/v3/count/batch \
##     -H "Content-Type: application/json" \
##     -d @examples/query-batch-count-single.yaml

queries:
  - index: taxon
    taxa: [Mammalia]
  - index: taxon
    taxa: [Aves]
  - index: taxon
    taxa: [Reptilia]
